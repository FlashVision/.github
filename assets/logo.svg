<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bolt-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ring-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#ring-gradient)" stroke-width="16" opacity="0.9"/>
  <!-- Inner circle background -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#ring-gradient)" stroke-width="4" opacity="0.3"/>
  <!-- Lightning bolt (Flash) -->
  <path d="M 296 80 L 196 240 L 256 240 L 216 432 L 336 248 L 272 248 Z" 
        fill="url(#bolt-gradient)" 
        stroke="none"/>
  <!-- Eye/Vision element - left arc -->
  <path d="M 120 256 Q 256 160 392 256" fill="none" stroke="url(#ring-gradient)" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <!-- Eye/Vision element - right arc -->
  <path d="M 120 256 Q 256 352 392 256" fill="none" stroke="url(#ring-gradient)" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
</svg>
